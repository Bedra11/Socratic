# .github/workflows/deploy.yml
name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          timeout:  60s
          script: |
            cd /home/ubuntu/Socratic
            git pull origin main
            docker stop socratic-api || true
            docker rm   socratic-api || true
            docker build -t socratic-api .
            docker run -d \
              --name socratic-api \
              --restart always \
              -p 8000:8000 \
              -e MLFLOW_TRACKING_URI="${{ secrets.MLFLOW_TRACKING_URI }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_DEFAULT_REGION="eu-west-3" \
              -e MODEL_NAME_ETHICS="socratic-ethics-classifier" \
              -e MODEL_NAME_FALLACY="socratic-fallacy-classifier" \
              -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              socratic-api
            echo "Container started"

      - name: Health Check
        run: |
          echo "Waiting for API to start..."
          sleep 30
          curl --fail --retry 5 --retry-delay 5 --retry-connrefused \
            http://${{ secrets.EC2_HOST }}:8000/ || exit 1
          echo "API is healthy"