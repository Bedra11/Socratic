# .github/workflows/deploy.yml
name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/ubuntu/Socratic
            git pull origin main
            docker stop socratic-api || true
            docker rm   socratic-api || true
            docker build -t socratic-api .
            docker run -d \
              --name socratic-api \
              --restart always \
              -p 8000:8000 \
              -e MLFLOW_TRACKING_URI="${MLFLOW_TRACKING_URI}" \
              -e AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}" \
              -e AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}" \
              -e AWS_DEFAULT_REGION="eu-west-3" \
              -e MODEL_NAME_ETHICS="socratic-ethics-classifier" \
              -e MODEL_NAME_FALLACY="socratic-fallacy-classifier" \
              -e GROQ_API_KEY="${GROQ_API_KEY}" \
              socratic-api
            echo "Container started"
          EOF

      - name: Health Check
        run: |
          echo "Waiting for API to start..."
          sleep 30
          curl --fail --retry 5 --retry-delay 5 --retry-connrefused \
            http://${{ secrets.EC2_HOST }}:8000/ || exit 1
          echo "API is healthy"