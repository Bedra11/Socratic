name: Retrain Models

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Retrain on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          timeout:  300s
          script: |
            cd /home/ubuntu/Socratic
            source /home/ubuntu/Socratic/.env
            git pull origin main
            source /home/ubuntu/venv/bin/activate
            dvc pull
            dvc repro
            dvc push
            docker stop socratic-api || true
            docker rm   socratic-api || true
            docker build -t socratic-api .
            docker run -d \
              --name socratic-api \
              --restart always \
              -p 8000:8000 \
              -e MLFLOW_TRACKING_URI="$MLFLOW_TRACKING_URI" \
              -e AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
              -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
              -e AWS_DEFAULT_REGION="eu-west-3" \
              -e GROQ_API_KEY="$GROQ_API_KEY" \
              socratic-api
            echo "Retrain complete and API restarted"

      - name: Health Check
        run: |
          sleep 30
          curl --fail --retry 5 --retry-delay 5 \
            http://${{ secrets.EC2_HOST }}:8000/ || exit 1
          echo "API healthy after retrain"