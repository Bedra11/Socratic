# .github/workflows/retrain.yml
name: Retrain Models

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Retrain on EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/ubuntu/Socratic
            source /home/ubuntu/Socratic/.env
            git pull origin main
            source /home/ubuntu/venv/bin/activate
            dvc pull
            dvc repro
            dvc push
            docker stop socratic-api || true
            docker rm   socratic-api || true
            docker build -t socratic-api .
            docker run -d \
              --name socratic-api \
              --restart always \
              -p 8000:8000 \
              -e MLFLOW_TRACKING_URI="$MLFLOW_TRACKING_URI" \
              -e AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
              -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
              -e AWS_DEFAULT_REGION="eu-west-3" \
              -e GROQ_API_KEY="$GROQ_API_KEY" \
              socratic-api
            echo "Retrain complete and API restarted"
          EOF

      - name: Health Check
        run: |
          sleep 30
          curl --fail --retry 5 --retry-delay 5 \
            http://${{ secrets.EC2_HOST }}:8000/ || exit 1
          echo "API healthy after retrain"