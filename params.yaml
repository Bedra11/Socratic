preprocess:
  # inputs
  ethics_input:    "data/raw/ethics_dataset.csv"
  fallacy_input:   "data/raw/fallacy_dataset.csv"
  mappings_input:  "data/raw/mappings.csv"

  # ethics outputs
  ethics_train:    "data/processed/ethics_train.csv"
  ethics_test:     "data/processed/ethics_test.csv"
  ethics_encoder:  "data/processed/ethics_label_encoder.pkl"

  # fallacy outputs
  fallacy_train:   "data/processed/fallacy_train.csv"
  fallacy_test:    "data/processed/fallacy_test.csv"
  fallacy_encoder: "data/processed/fallacy_label_encoder.pkl"

  # cleaning
  test_size:       0.2
  random_state:    42
  min_text_length: 20

train_ethics:
  train_data:    "data/processed/ethics_train.csv"
  model_path:    "models/ethics_model.pkl"
  random_state:  42
  max_features:  15000
  ngram_min:     1
  ngram_max:     2
  C:             1.0
  solver:        "lbfgs"
  max_iter:      1000

train_fallacy:
  train_data:    "data/processed/fallacy_train.csv"
  model_path:    "models/fallacy_model.pkl"
  random_state:  42
  max_features:  20000
  ngram_min:     1
  ngram_max:     3
  C:             5.0
  solver:        "lbfgs"
  max_iter:      2000
  class_weight:  "balanced"
  
evaluate:
  test_data:      "data/processed/fallacy_test.csv"
  model_path:     "models/model.pkl"
  metrics_output: "metrics/metrics.json"
  threshold:      0.55

register:
  model_name:     "thinkright-fallacy-classifier"
  stage:          "Staging"

aws:
  bucket:         "group4-soc-bucket"
  region_name:    "eu-west-3"

