<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Socratic Game</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
</head>
<body class="landing-body">

  <div class="parchment-overlay"></div>
  <div class="noise-overlay"></div>

  <main class="landing-container">

    <!-- Decorative top border -->
    <div class="ornament top-ornament">❧ ✦ ❧</div>

    <!-- Title block -->
    <div class="title-block">
      <p class="pre-title">An Inquiry Into Reason</p>
      <h1 class="main-title">The Socratic<br/>Game</h1>
      <div class="title-rule">
        <span class="rule-line"></span>
        <span class="rule-diamond">◆</span>
        <span class="rule-line"></span>
      </div>
      <p class="subtitle">
        Every choice reveals a pattern.<br/>
        Every reason carries a hidden structure.<br/>
        <em>Dare to examine how you think.</em>
      </p>
    </div>

    <!-- Quote -->
    <blockquote class="landing-quote">
      <p>"The unexamined life is not worth living."</p>
      <cite>— Socrates</cite>
    </blockquote>

    <!-- Start button -->
    <a href="/game" class="start-btn">
      <span class="btn-inner">Begin the Inquiry</span>
      <span class="btn-arrow">→</span>
    </a>

    <!-- Descriptor -->
    <p class="landing-descriptor">
      Five scenarios · Two models · One revelation
    </p>

    <!-- Decorative bottom border -->
    <div class="ornament bottom-ornament">❧ ✦ ❧</div>

  </main>

</body>
</html>
